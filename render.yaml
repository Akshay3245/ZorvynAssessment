databases:
  - name: finance-db
    databaseName: finance_dashboard
    user: finance_user

services:
  - type: web
    name: finance-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install --include=dev && npm run prisma:generate && npm run build
    startCommand: npm run prisma:migrate:deploy && npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: finance-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: CORS_ORIGIN
        value: https://your-frontend-domain.vercel.app
